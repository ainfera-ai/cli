name: Ainfera Trust Check
description: Fetch an agent's trust score and post it as a PR comment.
author: Ainfera Technologies
branding:
  icon: shield
  color: blue

inputs:
  api-key:
    description: Ainfera API key (starts with ainf_).
    required: true
  agent-id:
    description: Agent ID to check. Defaults to the repo's default agent.
    required: false
    default: ""
  min-score:
    description: Fail the job if the trust score falls below this value (0-1000).
    required: false
    default: "0"
  api-url:
    description: Override the Ainfera API URL.
    required: false
    default: https://api.ainfera.ai
  python-version:
    description: Python version to set up.
    required: false
    default: "3.11"
  comment-on-pr:
    description: Post the trust score as a PR comment.
    required: false
    default: "true"

outputs:
  score:
    description: The agent's current trust score.
    value: ${{ steps.check.outputs.score }}
  grade:
    description: The trust grade (e.g. AAA, AA, A, B, C).
    value: ${{ steps.check.outputs.grade }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Ainfera CLI
      shell: bash
      run: pip install --upgrade ainfera

    - name: Fetch trust score
      id: check
      shell: bash
      env:
        AINFERA_API_KEY: ${{ inputs.api-key }}
        AINFERA_API_URL: ${{ inputs.api-url }}
      run: |
        agent_arg=""
        if [ -n "${{ inputs.agent-id }}" ]; then agent_arg="${{ inputs.agent-id }}"; fi
        result="$(ainfera --json trust $agent_arg)"
        echo "$result"
        score="$(printf '%s' "$result" | python -c 'import json,sys;d=json.load(sys.stdin);print(d.get("score") or d.get("overall_score") or 0)')"
        grade="$(printf '%s' "$result" | python -c 'import json,sys;d=json.load(sys.stdin);print(d.get("grade",""))')"
        echo "score=$score" >> "$GITHUB_OUTPUT"
        echo "grade=$grade" >> "$GITHUB_OUTPUT"
        if [ "${{ inputs.min-score }}" != "0" ] && [ "$score" -lt "${{ inputs.min-score }}" ]; then
          echo "::error::Trust score $score is below the required minimum ${{ inputs.min-score }}"
          exit 1
        fi

    - name: Comment on PR
      if: ${{ inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const score = "${{ steps.check.outputs.score }}";
          const grade = "${{ steps.check.outputs.grade }}";
          const body = `### Ainfera Trust Check\n\n**Score:** ${score} / 1000  \n**Grade:** ${grade}`;
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body,
          });
